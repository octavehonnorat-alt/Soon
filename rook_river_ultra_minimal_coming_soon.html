<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Input styling to match image */
        .glass-input-container {
            background: linear-gradient(180deg, rgba(20,20,20,0.8) 0%, rgba(10,10,10,0.9) 100%);
            border: 1px solid #1A1A1A;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        .glass-input-container:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }
        
        .glass-button {
            background: linear-gradient(180deg, rgba(40,40,40,1) 0%, rgba(20,20,20,1) 100%);
            border-left: 1px solid #1A1A1A;
            transition: background 0.3s ease, transform 0.2s ease;
        }
        
        .glass-button:hover {
            background: linear-gradient(180deg, rgba(50,50,50,1) 0%, rgba(30,30,30,1) 100%);
            transform: scale(1.02);
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .fade-in-delay-1 {
            opacity: 0;
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }
        
        .fade-in-delay-2 {
            opacity: 0;
            animation: fadeIn 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ambient glowing background */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 70%);

<!-- Email Capture CTA -->

<button aria-label="Submit email" class="glass-button h-full px-6 flex items-center justify-center text-on-surface-variant hover:text-primary" type="submit">
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>

</div>
</main>
<!-- Footer Component (from JSON) -->
<script>
        // Subtle form interaction logic
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const icon = btn.querySelector('.material-symbols-outlined');
            const input = this.querySelector('input');
            
            if(input.value) {
                // Success micro-interaction
                icon.textContent = 'check';
                icon.classList.add('text-primary');
                input.value = '';
                input.placeholder = 'Thank you.';
                
                setTimeout(() => {
                    icon.textContent = 'arrow_forward';
                    icon.classList.remove('text-primary');
                    input.placeholder = 'Enter your email';
                }, 3000);
            }
        });
    </script>
